version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: iot_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping: 1})", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: iot_mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1883"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build: ./backend
    container_name: iot_backend
    ports:
      - "8000:8000"
    environment:
      - MOCK_MODE=false
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=smart_waste_db
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - TWILIO_WEBHOOK_URL=http://httpbin.org/post
      - ALLOWED_ORIGINS=*
    depends_on:
      mongodb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: iot_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
