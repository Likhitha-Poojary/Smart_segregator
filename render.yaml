services:
  # 1. Backend Web Service (FastAPI)
  - type: web
    name: smart-waste-backend
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: MOCK_MODE
        value: "true" # Default to true for easy setup on Render (runs mock simulation in-memory)
      - key: MONGO_URI
        value: mongodb://localhost:27017 # User can override this in Render settings to connect to MongoDB Atlas
      - key: MONGO_DB
        value: smart_waste_db
      - key: MQTT_BROKER
        value: broker.hivemq.com
      - key: MQTT_PORT
        value: "1883"
      - key: ALLOWED_ORIGINS
        value: "*"

  # 2. Frontend Static Site (Served via CDN - Free & High Performance)
  - type: static
    name: smart-waste-frontend
    buildCommand: npm run build
    publishDir: dist
    root: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: smart-waste-backend
          property: host
